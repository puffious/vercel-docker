<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel SSH-like Terminal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Source Code Pro', monospace;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a1a 100%);
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #terminal-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: #000;
            border-radius: 12px;
            box-shadow: 
                0 0 50px rgba(0, 255, 136, 0.3),
                0 0 100px rgba(0, 255, 136, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .terminal-header {
            background: linear-gradient(180deg, #2d2d2d 0%, #1f1f1f 100%);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #444;
            user-select: none;
        }

        .terminal-controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-btn.close {
            background: #ff5f57;
        }

        .control-btn.minimize {
            background: #ffbd2e;
        }

        .control-btn.maximize {
            background: #28ca42;
        }

        .control-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px currentColor;
        }

        .terminal-title {
            font-size: 14px;
            font-weight: 600;
            color: #ccc;
            text-align: center;
            flex-grow: 1;
            margin-left: -60px;
        }

        .terminal-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .terminal-output {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .terminal-output::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-output::-webkit-scrollbar-track {
            background: #111;
        }

        .terminal-output::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        .terminal-output::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        .terminal-line {
            margin-bottom: 2px;
        }

        .terminal-command {
            color: #e0e0e0;
        }

        .terminal-result {
            color: #00ff88;
        }

        .terminal-error {
            color: #ff6b6b;
        }

        .terminal-welcome {
            color: #64b5f6;
        }

        .terminal-suggestion {
            color: #ffd54f;
            background: rgba(255, 213, 79, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            margin: 4px 0;
        }

        .terminal-control {
            color: #ff8a65;
        }

        .terminal-input-line {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid #222;
            position: relative;
        }

        .terminal-prompt {
            color: #00ff88;
            font-weight: 600;
            white-space: nowrap;
            margin-right: 8px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            caret-color: #00ff88;
        }

        .terminal-input::selection {
            background: rgba(0, 255, 136, 0.3);
        }

        .terminal-loading {
            display: none;
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
        }

        .terminal-loading.active {
            display: block;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-top: 2px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            #terminal-container {
                height: 95vh;
                border-radius: 8px;
            }
            
            .terminal-output {
                font-size: 12px;
                padding: 12px;
            }
            
            .terminal-input-line {
                padding: 10px 12px;
            }
            
            .terminal-input {
                font-size: 16px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .control-btn {
                transition: none;
            }
            
            .loading-spinner {
                animation: none;
                border: 2px solid #00ff88;
            }
        }

        @media (prefers-contrast: high) {
            .terminal-result {
                color: #00ff00;
            }
            
            .terminal-error {
                color: #ff0000;
            }
            
            .terminal-prompt {
                color: #00ff00;
                text-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div id="terminal-container">
        <div class="terminal-header">
            <div class="terminal-controls">
                <div class="control-btn close"></div>
                <div class="control-btn minimize"></div>
                <div class="control-btn maximize"></div>
            </div>
            <div class="terminal-title">Vercel Web Terminal - SSH Ready</div>
        </div>
        <div class="terminal-body">
            <div class="terminal-output" id="output"></div>
            <div class="terminal-input-line">
                <span class="terminal-prompt" id="prompt">user@vercel:~$</span>
                <input type="text" class="terminal-input" id="commandInput" autocomplete="off" autofocus>
            </div>
        </div>
        <div class="terminal-loading" id="loading">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <script src="terminal.js"></script>
</body>
</html>
